services:
  api:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-builderos}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-builderos}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      MINIO_ENDPOINT: minio:9000
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-hybrid}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      LLM_AUTO_PULL: ${LLM_AUTO_PULL:-true}
      LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-http://omniroute:20128}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-auto/cheap}
      LLM_CLOUD_FOR_KNOWLEDGE: ${LLM_CLOUD_FOR_KNOWLEDGE:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-builderos}
      POSTGRES_USER: ${POSTGRES_USER:-builderos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-builderos}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-builderos-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Локальная LLM — стартует вместе с приложением
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s

  # Автозагрузка модели при первом запуске (далее мгновенно — модель уже в volume)
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "BuilderOS: ensuring model $$LLM_MODEL ..."
        ollama pull "$$LLM_MODEL"
        echo "BuilderOS: model $$LLM_MODEL ready"
    restart: "no"

  # Опциональный бесплатный AI-gateway: docker compose --profile omniroute up
  # Dashboard/API: http://localhost:20128  (OpenAI: /v1)
  # Документация: https://github.com/diegosouzapw/OmniRoute
  omniroute:
    image: diegosouzapw/omniroute:latest
    profiles: ["omniroute"]
    ports:
      - "${OMNIROUTE_PORT:-20128}:20128"
    volumes:
      - omniroute_data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  ollama_data:
  omniroute_data:
